<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Clubs — Queer Sports NYC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #111; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { flex: 1; padding: 10px; font-size: 15px; font-weight: 500; border-radius: 10px; border: 1px solid #ddd; background: white; color: #111; cursor: pointer; }
  .tab.active { background: #111; color: white; border-color: #111; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  input, select, textarea { width: 100%; padding: 10px 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 10px; background: white; color: #111; appearance: none; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #999; }
  textarea { resize: none; height: 70px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .check { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .check input { width: auto; }
  .check label { text-transform: none; font-size: 15px; color: #111; letter-spacing: 0; }
  button.submit { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; background: #111; color: white; border: none; border-radius: 12px; margin-top: 8px; cursor: pointer; }
  button.submit:disabled { background: #999; }
  .status { margin-top: 14px; padding: 12px 14px; border-radius: 10px; font-size: 15px; display: none; }
  .ok { background: #e6f9ee; color: #1a7a3f; }
  .err { background: #fdecea; color: #c0392b; }
</style>
</head>
<body>
<h1>Queer Sports NYC</h1>
<div class="tabs">
  <button class="tab active" onclick="setMode('add')">Add club</button>
  <button class="tab" onclick="setMode('edit')">Edit club</button>
</div>
<div id="edit-selector" style="display:none">
  <div class="field">
    <label>Select club</label>
    <select id="club-select" onchange="loadClub()">
      <option value="">— choose a club —</option>

    </select>
  </div>
</div>
<div class="field"><label>Name</label><input id="name" type="text" placeholder="Club name" /></div>
<div class="row">
  <div class="field">
    <label>Sport</label>
    <select id="sport" onchange="toggleCustomSport()">
      <option>Soccer</option><option>Basketball</option><option>Running</option><option>Tennis / Pickleball</option><option>Biking</option><option>Football / Rugby</option><option>Volleyball</option><option>Cup Pong & Pool</option><option>Roller Derby</option><option>Climbing</option><option>Archery</option><option>Softball</option><option>Hockey</option><option>Boxing</option><option>Women's Sports Bars</option><option>Other</option>
    </select>
  </div>
  <div class="field"><label>Type</label><select id="type"><option>Club</option><option>League</option><option>Seasonal Club</option><option>Bar</option><option>Classes</option><option>Open Gym</option><option>Moving Bar / Watch Parties</option></select></div>
</div>
<div class="field" id="custom-sport-field" style="display:none">
  <label>Custom sport name</label>
  <input id="custom-sport" type="text" placeholder="e.g. Gymnastics" />
</div>
<div class="row">
  <div class="field"><label>Cost</label><input id="cost" type="text" placeholder="e.g. Free" /></div>
  <div class="field"><label>Days</label><input id="days" type="text" placeholder="e.g. Saturdays" /></div>
</div>
<div class="field"><label>Instagram URL</label><input id="instagram" type="text" placeholder="https://www.instagram.com/handle" /></div>
<div class="field"><label>Notes</label><textarea id="notes" placeholder="Any extra info"></textarea></div>
<div class="check"><input type="checkbox" id="queer" checked /><label for="queer">Queer</label></div>
<button class="submit" id="btn" onclick="push()">Push to queersportsnyc.com</button>
<div class="status" id="status"></div>
<script>
const WORKER = 'https://queer-sports-nyc.thearanelli.workers.dev/';
const clubs = [{"id":1,"name":"Footy With Friends","sport":"Soccer","type":"Club","cost":"Free","days":"Tues / Thurs","instagram":"https://www.instagram.com/footy.withfriends/","queer":true,"notes":""},{"id":2,"name":"Ladies Village Soccer","sport":"Soccer","type":"Club","cost":"Free","days":"Sat","instagram":"https://www.instagram.com/ladiesvillagesoccer/","queer":true,"notes":""},{"id":3,"name":"Queer Soccer League","sport":"Soccer","type":"Club","cost":"$","days":"Fri","instagram":"https://www.instagram.com/queersoccerleague/","queer":true,"notes":""},{"id":4,"name":"NYC Footy Flip League","sport":"Soccer","type":"League","cost":"$","days":"Dates vary","instagram":"https://www.instagram.com/nycfootyflipleague/","queer":false,"notes":"Female majority, not explicitly queer"},{"id":5,"name":"Fruit Hoops NYC","sport":"Basketball","type":"Club","cost":"Free","days":"Sun","instagram":"https://www.instagram.com/froothoopsnyc/","queer":true,"notes":""},{"id":6,"name":"Pride Basketball","sport":"Basketball","type":"League","cost":"$","days":"Sun","instagram":"https://www.instagram.com/pridebasketballleaguenyc/","queer":true,"notes":""},{"id":7,"name":"Basketdolls NYC","sport":"Basketball","type":"Club","cost":"Free","days":"Sat / Sun","instagram":"https://www.instagram.com/basketdolls/","queer":true,"notes":"Trans+"},{"id":8,"name":"NY Urban","sport":"Basketball","type":"League","cost":"$","days":"Dates vary","instagram":"https://www.instagram.com/nyurban/","queer":false,"notes":"Not explicitly queer"},{"id":9,"name":"BCPC","sport":"Basketball","type":"Open Gym","cost":"Free","days":"Mon / Sat","instagram":"https://www.lgbtbrooklyn.org/fitness","queer":true,"notes":""},{"id":10,"name":"Dyke Running NYC","sport":"Running","type":"Club","cost":"Free","days":"Mon / Wed / Fri","instagram":"https://www.instagram.com/dykerunnyc/","queer":true,"notes":""},{"id":11,"name":"Queer Feet NYC","sport":"Running","type":"Club","cost":"Free","days":"Wed / Sat","instagram":"https://www.instagram.com/queerfeetnyc/","queer":true,"notes":""},{"id":12,"name":"Queer NYC Pickleball","sport":"Tennis / Pickleball","type":"Seasonal Club","cost":"Free","days":"Dates vary","instagram":"https://www.instagram.com/queernycpickleball/","queer":true,"notes":""},{"id":13,"name":"Big Apple Rec Sports","sport":"Tennis / Pickleball","type":"League","cost":"$","days":"Dates vary","instagram":"https://www.instagram.com/bigapplerecsports/","queer":true,"notes":""},{"id":14,"name":"Queer Tennis","sport":"Tennis / Pickleball","type":"Seasonal Club","cost":"Varies","days":"Dates vary","instagram":"https://www.instagram.com/queer4tennis/","queer":true,"notes":""},{"id":15,"name":"Queer Joy Rides","sport":"Biking","type":"Club","cost":"Free","days":"Tue","instagram":"https://www.instagram.com/queer.joyride/","queer":true,"notes":""},{"id":16,"name":"Nightcap Brooklyn","sport":"Biking","type":"Club","cost":"Free","days":"Mon","instagram":"https://www.instagram.com/nightcap_brooklyn/","queer":true,"notes":""},{"id":17,"name":"Lesbian Bike Clurb","sport":"Biking","type":"Club","cost":"Free","days":"Dates vary","instagram":"https://www.instagram.com/lesbianbikeclurb","queer":true,"notes":""},{"id":18,"name":"The L League","sport":"Football / Rugby","type":"Seasonal Club","cost":"Free","days":"Mon","instagram":"https://www.instagram.com/thelleaguenyc/","queer":true,"notes":""},{"id":19,"name":"NYGFL (wplus)","sport":"Football / Rugby","type":"League","cost":"$","days":"Sat","instagram":"https://www.instagram.com/nygfl_wplus/","queer":true,"notes":""},{"id":20,"name":"Queens Rugby Women","sport":"Football / Rugby","type":"League","cost":"","days":"Tues / Thurs","instagram":"https://www.instagram.com/queensrugbywomens/","queer":false,"notes":"Not explicitly queer"},{"id":21,"name":"Spykes NYC","sport":"Volleyball","type":"Club","cost":"$","days":"Sun","instagram":"https://www.instagram.com/spykesnyc/","queer":true,"notes":""},{"id":22,"name":"NY Urban Volleyball","sport":"Volleyball","type":"League","cost":"$","days":"Dates vary","instagram":"https://www.instagram.com/nyurban/","queer":false,"notes":"Not explicitly queer"},{"id":23,"name":"Sapphix Hits","sport":"Volleyball","type":"Club","cost":"$","days":"Dates vary","instagram":"https://www.instagram.com/sapphix.hits/","queer":true,"notes":""},{"id":24,"name":"Queer Pong BK","sport":"Cup Pong & Pool","type":"League","cost":"$","days":"Thurs","instagram":"https://www.instagram.com/queerpongbk/","queer":true,"notes":""},{"id":25,"name":"Queer Pool Hotties","sport":"Cup Pong & Pool","type":"Club","cost":"Free","days":"Monthly","instagram":"https://www.instagram.com/queerpoolhotties/","queer":true,"notes":""},{"id":26,"name":"Frog Wine Bar Queer Pool","sport":"Cup Pong & Pool","type":"Club","cost":"Free","days":"Weds","instagram":"https://www.instagram.com/frogwinebar/","queer":true,"notes":""},{"id":27,"name":"Gotham Roller Derby","sport":"Roller Derby","type":"League","cost":"","days":"Dates vary","instagram":"https://www.instagram.com/gothamderby","queer":true,"notes":""},{"id":28,"name":"Crux Climbing","sport":"Climbing","type":"Club","cost":"Free","days":"Dates vary","instagram":"https://www.instagram.com/climbcrux/","queer":true,"notes":"LGBTQIA+"},{"id":29,"name":"Queer Archery","sport":"Archery","type":"Club","cost":"Free","days":"Bi-monthly","instagram":"https://www.instagram.com/queerarchery/","queer":true,"notes":"LGBTQIA+"},{"id":30,"name":"BASL Softball","sport":"Softball","type":"League","cost":"$","days":"Sat","instagram":"https://www.instagram.com/baslwtnb/","queer":true,"notes":""},{"id":31,"name":"Resting Pitch Face","sport":"Softball","type":"Club","cost":"","days":"","instagram":"https://www.instagram.com/resting_pitchface/","queer":true,"notes":""},{"id":32,"name":"BK Softball Collective","sport":"Softball","type":"League","cost":"$","days":"Sat","instagram":"https://www.instagram.com/bksoftballcollective/","queer":true,"notes":""},{"id":33,"name":"Brooklyn Bladers","sport":"Hockey","type":"Club","cost":"Free","days":"Dates vary","instagram":"https://www.instagram.com/brooklynbladers/","queer":true,"notes":""},{"id":34,"name":"Outbox Gym","sport":"Boxing","type":"Classes","cost":"$","days":"","instagram":"https://www.instagram.com/outboxnyc/","queer":true,"notes":"LGBTQIA women's"},{"id":35,"name":"Athena Keke's","sport":"Women's Sports Bars","type":"Bar","cost":"","days":"","instagram":"https://www.instagram.com/athenakekesnyc/","queer":true,"notes":"Brooklyn ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Clinton Hill"},{"id":36,"name":"Wilkas","sport":"Women's Sports Bars","type":"Bar","cost":"","days":"","instagram":"https://www.instagram.com/wilkasnyc/","queer":true,"notes":"Manhattan ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ LES"},{"id":37,"name":"Blazers Sports Bar","sport":"Women's Sports Bars","type":"Bar","cost":"","days":"","instagram":"https://www.instagram.com/blazerssportsbar/","queer":true,"notes":"Brooklyn ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Williamsburg"},{"id":38,"name":"Women's Sports Rally","sport":"Women's Sports Bars","type":"Moving Bar / Watch Parties","cost":"","days":"","instagram":"https://www.instagram.com/womxnsportsrally/","queer":true,"notes":""},{"id":39,"name":"Tranfl nyc","sport":"Football / Rugby","type":"Club","cost":"Free","days":"Varies","instagram":"https://www.instagram.com/tranfl.nyc/","queer":true,"notes":"Trans-focused"}];
let mode = 'add', editId = null;

function toggleCustomSport() {
  const val = document.getElementById('sport').value;
  document.getElementById('custom-sport-field').style.display = val === 'Other' ? 'block' : 'none';
}

function getSport() {
  const val = document.getElementById('sport').value;
  if (val === 'Other') return document.getElementById('custom-sport').value.trim();
  return val;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.trim() === (m === 'add' ? 'Add club' : 'Edit club')));
  document.getElementById('edit-selector').style.display = m === 'edit' ? 'block' : 'none';
  document.getElementById('btn').textContent = m === 'add' ? 'Push to queersportsnyc.com' : 'Save changes';
  if (m === 'add') clearForm();
}

function loadClub() {
  const id = parseInt(document.getElementById('club-select').value);
  const club = clubs.find(c => c.id === id);
  if (!club) return;
  editId = club.id;
  document.getElementById('name').value = club.name;
  const sportSelect = document.getElementById('sport');
  const knownSport = Array.from(sportSelect.options).find(o => o.value === club.sport);
  if (knownSport) {
    sportSelect.value = club.sport;
  } else {
    sportSelect.value = 'Other';
    document.getElementById('custom-sport').value = club.sport;
    document.getElementById('custom-sport-field').style.display = 'block';
  }
  document.getElementById('type').value = club.type;
  document.getElementById('cost').value = club.cost || '';
  document.getElementById('days').value = club.days || '';
  document.getElementById('instagram').value = club.instagram || '';
  document.getElementById('notes').value = club.notes || '';
  document.getElementById('queer').checked = club.queer;
}

function clearForm() {
  ['name','cost','days','instagram','notes','custom-sport'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('sport').selectedIndex = 0;
  document.getElementById('type').selectedIndex = 0;
  document.getElementById('queer').checked = true;
  document.getElementById('custom-sport-field').style.display = 'none';
  editId = null;
}

async function push() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  btn.disabled = true; btn.textContent = 'Pushing...'; status.style.display = 'none';
  const club = { id: editId, name: document.getElementById('name').value.trim(), sport: getSport(), type: document.getElementById('type').value, cost: document.getElementById('cost').value.trim(), days: document.getElementById('days').value.trim(), instagram: document.getElementById('instagram').value.trim(), queer: document.getElementById('queer').checked, notes: document.getElementById('notes').value.trim() };
  const body = mode === 'edit' ? { action: 'edit', club } : { action: 'add', club };
  try {
    const res = await fetch(WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) {
      status.className = 'status ok';
      status.textContent = mode === 'add' ? '\u2713 "' + data.name + '" added as #' + data.id : '\u2713 "' + data.name + '" updated';
      if (mode === 'add') clearForm();
    } else throw new Error(JSON.stringify(data.error));
  } catch(e) {
    status.className = 'status err';
    status.textContent = 'Error: ' + e.message;
  }
  status.style.display = 'block';
  btn.disabled = false;
  btn.textContent = mode === 'add' ? 'Push to queersportsnyc.com' : 'Save changes';
}
</script>
</body>
</html>
